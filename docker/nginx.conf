server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip static assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               application/wasm image/svg+xml;

    # Cache immutable assets (Flutter fingerprints them)
    location ~* \.(js|wasm|png|jpg|gif|ico|css|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Flutter SPA — all routes → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
