name: Build & push web image

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: olekssobol/codeledger

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Create credentials stub
        run: |
          mkdir -p lib/core/constants
          printf 'const String googleServerClientId = "";\n' > lib/core/constants/google_credentials.dart

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Download sqlite3.wasm
        run: |
          SQLITE3_VERSION=$(grep -A8 "name: sqlite3$" pubspec.lock | grep 'version:' | head -1 | sed "s/.*version: '//;s/'//;s/.*version: \"//;s/\"//;s/ //g")
          echo "sqlite3 version: $SQLITE3_VERSION"
          curl -L "https://github.com/simolus3/sqlite3.dart/releases/download/sqlite3-${SQLITE3_VERSION}/sqlite3.wasm" -o web/sqlite3.wasm

      - name: Compile drift web worker
        run: dart compile js web/drift_worker.dart -O2 -o web/drift_worker.js

      - name: Build web
        run: flutter build web --release

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.web
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
